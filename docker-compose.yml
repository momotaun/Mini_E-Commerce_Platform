version: "3.8"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Comment out in production to avoid exposing DB
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "/opt/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - 8000:8000
    volumes:
      - ./backend/app:/app
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      # Add other backend env vars here
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: >
      sh -c "npm run dev -- --host"
    ports:
      - 5173:5173
    develop:
      watch:
        - path: ./frontend/app
          action: sync
          target: /frontend/app
          ignore:
            - node_modules
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: